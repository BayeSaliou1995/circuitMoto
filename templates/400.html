{% extends "circuitMoto/inscription/base/base_inscription.html" %}
{% block content %}
  {% include "circuitMoto/partials/_error_style.html" %}

  <div class="err-wrap">
    <div class="err-card">
      <div class="err-hero">
        <span class="err-code"><span class="err-chip">400</span> Requête invalide</span>
        <div class="err-halo"></div>
      </div>
      <div class="err-body">
        <p class="err-msg">La requête n’a pas pu être traitée.</p>
        {% if request_path %}<div class="err-path">{{ request_path }}</div>{% endif %}
        <div class="err-actions">
          <a class="btn btn-primary" href="/">Aller à l’accueil</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
